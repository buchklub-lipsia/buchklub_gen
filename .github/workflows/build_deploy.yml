name: Build and deploy

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
    - name: Checkout deployment repo
      uses: actions/checkout@v4
      with:
        repository: buchklub-lipsia/buchklub-lipsia.github.io
        path: static
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Build
      run: cargo run
    - name: Deploy
      run: |
        cd static
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add .
        git commit -m "$(date)"
        git push https://x-access-token:${DEPLOY_KEY}@github.com/buchklub-lipsia/buchklub-lipsia.github.io.git HEAD:main --force
